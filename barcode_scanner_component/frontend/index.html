<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Barcode Scanner</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/streamlit-component-lib@1.0.0/dist/index.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: transparent;
            padding: 8px;
        }
        #scanner-container {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
        }
        #reader {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #e0e0e0;
        }
        #result-box {
            margin-top: 10px;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            display: none;
        }
        #result-box.success {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #a5d6a7;
            display: block;
        }
        #result-box.waiting {
            background: #e3f2fd;
            color: #1565c0;
            border: 1px solid #90caf9;
            display: block;
        }
        #rescan-btn {
            margin-top: 8px;
            padding: 8px 20px;
            background: #1976d2;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            display: none;
        }
        #rescan-btn:hover { background: #1565c0; }
    </style>
</head>
<body>
<div id="scanner-container">
    <div id="reader"></div>
    <div id="result-box" class="waiting">📷 Camera shuru ho rahi hai...</div>
    <button id="rescan-btn" onclick="startScanner()">🔄 Dobara Scan Karein</button>
</div>

<script>
    // Streamlit component communication setup
    const Streamlit = window.Streamlit;
    let scanner = null;
    let scanDone = false;

    function setFrameHeight() {
        const h = document.body.scrollHeight;
        Streamlit.setFrameHeight(h);
    }

    function startScanner() {
        scanDone = false;
        document.getElementById('rescan-btn').style.display = 'none';
        document.getElementById('result-box').className = 'waiting';
        document.getElementById('result-box').innerText = '📷 Camera shuru ho rahi hai...';
        document.getElementById('result-box').style.display = 'block';

        if (scanner) {
            scanner.clear().then(() => initScanner()).catch(() => initScanner());
        } else {
            initScanner();
        }
    }

    function initScanner() {
        scanner = new Html5QrcodeScanner(
            "reader",
            {
                fps: 15,
                qrbox: { width: 280, height: 120 },
                rememberLastUsedCamera: true,
                supportedScanTypes: [
                    Html5QrcodeScanType.SCAN_TYPE_CAMERA
                ]
            },
            false
        );
        scanner.render(onScanSuccess, onScanFailure);
        setTimeout(setFrameHeight, 1000);
    }

    function onScanSuccess(decodedText) {
        if (scanDone) return;
        scanDone = true;

        // Stop scanner after successful scan
        scanner.clear().catch(() => {});

        // Show result
        const resultBox = document.getElementById('result-box');
        resultBox.className = 'success';
        resultBox.innerText = '✅ Scanned: ' + decodedText;
        document.getElementById('rescan-btn').style.display = 'inline-block';

        setFrameHeight();

        // ✅ Send value back to Python via Streamlit's official component API
        Streamlit.setComponentValue(decodedText);
    }

    function onScanFailure(error) {
        // Silent — don't show errors in UI
    }

    // Initialize on load
    window.addEventListener('load', () => {
        startScanner();
        setFrameHeight();
    });
</script>
</body>
</html>
